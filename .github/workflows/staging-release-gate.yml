name: Staging Release Gate

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck web app
        run: bun run --cwd apps/web typecheck

      - name: Build web app
        run: bun run --cwd apps/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  smoke:
    runs-on: ubuntu-latest
    needs: validate
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify smoke-test secrets
        run: |
          test -n "$PLAYWRIGHT_BASE_URL"
          test -n "$E2E_LOGIN_EMAIL"
          test -n "$E2E_LOGIN_PASSWORD"

      - name: Install Playwright browser
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run staging smoke suite
        run: cd apps/web && bunx playwright test e2e/staging-smoke.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
